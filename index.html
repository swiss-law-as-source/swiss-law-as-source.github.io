<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Law — Federal & Cantonal Legislation</title>
    <style>
        :root {
            --red: #D52B1E;
            --dark: #1a1a1a;
            --gray: #f5f5f5;
            --border: #e0e0e0;
            --cantonal: #2B6ED5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--dark);
            line-height: 1.6;
            background: #fff;
        }
        header {
            background: var(--red);
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }
        header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        header p { opacity: 0.9; font-size: 0.95rem; }
        .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }
        .search-box {
            position: sticky;
            top: 0;
            background: #fff;
            padding: 1rem 0;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--red); }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: var(--gray); }
        .filter-btn.active {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }
        .filter-btn.active-cantonal {
            background: var(--cantonal);
            color: #fff;
            border-color: var(--cantonal);
        }
        .stats {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #666;
        }
        .category-header {
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid var(--red);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .category-header.cantonal {
            border-bottom-color: var(--cantonal);
        }
        .scope-badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-weight: 500;
            vertical-align: middle;
            margin-left: 0.5rem;
        }
        .scope-badge.federal { background: #fdeaea; color: var(--red); }
        .scope-badge.cantonal { background: #eaf0fd; color: var(--cantonal); }
        .law-list { list-style: none; }
        .law-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: baseline;
        }
        .law-item:last-child { border-bottom: none; }
        .sr-number {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.85rem;
            color: var(--red);
            white-space: nowrap;
            min-width: 7rem;
            font-weight: 600;
        }
        .sr-number.cantonal { color: var(--cantonal); }
        .sr-number a { color: inherit; text-decoration: none; }
        .sr-number a:hover { text-decoration: underline; }
        .law-title { font-size: 0.9rem; }
        .hidden { display: none; }
        footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.8rem;
            color: #999;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        footer a { color: var(--red); }
        @media (max-width: 600px) {
            .law-item { flex-direction: column; gap: 0.1rem; }
            .sr-number { min-width: auto; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Swiss Law</h1>
        <p>Federal & Cantonal Legislation — version-controlled on GitHub</p>
    </header>
    <div class="container">
        <div class="search-box">
            <input type="text" id="search" placeholder="Search by number or title (e.g. &quot;obligationenrecht&quot; or &quot;300.100&quot;)..." autocomplete="off">
            <div class="filter-row">
                <button class="filter-btn active" data-scope="all">All</button>
                <button class="filter-btn" data-scope="federal">Federal</button>
                <button class="filter-btn" data-scope="cantonal">Cantonal</button>
                <select id="canton-filter" style="padding:0.3rem;font-size:0.8rem;border:1px solid var(--border);border-radius:4px;display:none;">
                    <option value="">All Cantons</option>
                </select>
            </div>
            <div class="stats" id="stats">Loading index...</div>
        </div>
        <div id="results"></div>
    </div>
    <footer>
        Data from <a href="https://www.fedlex.admin.ch" target="_blank">Fedlex</a> &
        cantonal sources |
        Source on <a href="https://github.com/benjamin-arfa/swiss-law" target="_blank">GitHub</a> |
        <a href="diff.html">Diff Viewer</a> |
        <a href="stats.html">Statistics</a> |
        <a href="crossrefs.html">Cross-Refs</a> |
        <a href="cross_level_refs.html">Federal ↔ Cantonal</a> |
        Updated automatically
    </footer>
    <script>
        const REPO_BASE = "https://github.com/benjamin-arfa/swiss-law/blob/main/";
        let allLaws = [];
        let activeScope = "all";
        let activeCanton = "";

        async function init() {
            const res = await fetch("laws.json");
            allLaws = await res.json();

            // Populate canton filter dropdown
            const cantons = [...new Set(allLaws.filter(l => l.scope === "cantonal").map(l => l.canton))].sort();
            const select = document.getElementById("canton-filter");
            for (const c of cantons) {
                const opt = document.createElement("option");
                opt.value = c;
                opt.textContent = c.toUpperCase() + " – " + (allLaws.find(l => l.canton === c)?.cat.split(" – ")[1] || c);
                select.appendChild(opt);
            }

            updateStats();
            renderResults(getFiltered().slice(0, 200), true);
        }

        function getFiltered() {
            let filtered = allLaws;
            if (activeScope !== "all") {
                filtered = filtered.filter(l => l.scope === activeScope);
            }
            if (activeCanton) {
                filtered = filtered.filter(l => l.canton === activeCanton);
            }
            const query = document.getElementById("search").value.trim();
            if (query) {
                const terms = query.toLowerCase().split(/\s+/);
                filtered = filtered.filter(law => {
                    const text = `${law.sr} ${law.title} ${law.cat}`.toLowerCase();
                    return terms.every(t => text.includes(t));
                });
            }
            return filtered;
        }

        function updateStats() {
            const filtered = getFiltered();
            const federal = allLaws.filter(l => l.scope === "federal").length;
            const cantonal = allLaws.filter(l => l.scope === "cantonal").length;
            document.getElementById("stats").textContent =
                `${allLaws.length.toLocaleString()} laws (${federal.toLocaleString()} federal, ${cantonal.toLocaleString()} cantonal)`;
        }

        function renderResults(laws, isInitial) {
            const container = document.getElementById("results");
            const total = getFiltered().length;

            if (laws.length === 0) {
                container.innerHTML = '<p style="margin-top:2rem;color:#666;">No results found.</p>';
                document.getElementById("stats").textContent = "0 results found";
                return;
            }

            // Group by category
            const groups = {};
            for (const law of laws) {
                if (!groups[law.cat]) groups[law.cat] = [];
                groups[law.cat].push(law);
            }

            let html = "";
            for (const [cat, items] of Object.entries(groups)) {
                const isCantonal = items[0]?.scope === "cantonal";
                html += `<div class="category-header${isCantonal ? ' cantonal' : ''}">${cat}</div><ul class="law-list">`;
                for (const item of items) {
                    const url = REPO_BASE + item.path;
                    const numClass = item.scope === "cantonal" ? "sr-number cantonal" : "sr-number";
                    html += `<li class="law-item">
                        <span class="${numClass}"><a href="${url}" target="_blank">${item.sr}</a></span>
                        <span class="law-title">${item.title}</span>
                    </li>`;
                }
                html += "</ul>";
            }

            if (isInitial && laws.length < total) {
                html += `<p style="margin-top:1rem;color:#666;font-size:0.85rem;">Showing first ${laws.length} of ${total.toLocaleString()} laws. Type to search all.</p>`;
            }

            if (!isInitial) {
                document.getElementById("stats").textContent = `${total.toLocaleString()} result${total !== 1 ? "s" : ""} found`;
            }

            container.innerHTML = html;
        }

        function applyFilters() {
            const filtered = getFiltered();
            const query = document.getElementById("search").value.trim();
            if (query) {
                renderResults(filtered, false);
            } else {
                renderResults(filtered.slice(0, 200), true);
                updateStats();
            }
        }

        // Scope filter buttons
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active", "active-cantonal"));
                const scope = btn.dataset.scope;
                activeScope = scope;
                btn.classList.add(scope === "cantonal" ? "active-cantonal" : "active");

                // Show/hide canton dropdown
                const cantonSelect = document.getElementById("canton-filter");
                cantonSelect.style.display = (scope === "cantonal" || scope === "all") ? "inline-block" : "none";
                if (scope === "federal") {
                    activeCanton = "";
                    cantonSelect.value = "";
                }

                applyFilters();
            });
        });

        // Canton dropdown filter
        document.getElementById("canton-filter").addEventListener("change", (e) => {
            activeCanton = e.target.value;
            applyFilters();
        });

        // Search input
        let debounceTimer;
        document.getElementById("search").addEventListener("input", (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => applyFilters(), 150);
        });

        init();
    </script>
</body>
</html>
